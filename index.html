<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
    <!-- Open Graph Preview -->
<meta property="og:title" content="Dictator Mbappe Moments">
<meta property="og:description" content="Crazy Highlights Moments">
<meta property="og:type" content="website">
<meta property="og:url" content="https://gpu-sim-lab.vercel.app">
<meta property="og:image" content="https://gpu-sim-lab.vercel.app/preview.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<title>System Check</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    overflow:hidden;
    text-align:center;
    cursor:auto;
}

/* SCREENS */
.screen{
    display:none;
    width:100vw;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:absolute;
    top:0;
    left:0;
}

.broken-active{
    animation:
        screenBreak 1.2s ease-in-out 1 forwards,
        microFlicker 0.15s infinite 1.2s;
}

#start{
    display:flex;
}

/* BUTTON */
button{
    padding:15px 30px;
    font-size:1.2rem;
    cursor:pointer;
}

/* LOADING BAR */
.bar{
    width:300px;
    height:20px;
    border:1px solid white;
    margin-top:20px;
}

.fill{
    height:100%;
    width:0%;
    background:lime;
    animation:load 3s linear forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}

/* PANIC TEXT (UPDATED BUT YOUR ORIGINAL FLOW KEPT) */
#panic{
    color:#ff2b2b;
    font-size:1.3rem;
    line-height:1.6;
    will-change: transform;
}

/* FINAL IMAGE */
#final img{
    position:absolute;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
    z-index:1;
    opacity:0;
}



/* FINAL TEXT */
#finalText{
    position:absolute;
    bottom:60px;
    left:50%;
    transform:translateX(-50%);
    font-size:2rem;
    color:#8b0000;
    text-shadow:0 0 10px red, 0 0 20px darkred;
    z-index:10;
    animation:flicker 1.5s infinite;
}

@keyframes flicker{
    0%,100%{opacity:1;}
    50%{opacity:0.5;}
}

/* =========================
   GLITCH + BREAK OVERLAYS
========================= */

#glitchOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    z-index:998;
    pointer-events:none;
    opacity:0;
}

#brokenScreen{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    z-index:997;
    pointer-events:none;
    opacity:0;
    background:
        /* vertical cracks */
        linear-gradient(90deg, transparent 48%, rgba(255,255,255,0.12) 49%, rgba(255,255,255,0.18) 50%, transparent 51%),

        /* diagonal cracks */
        linear-gradient(45deg, transparent 47%, rgba(255,0,0,0.10) 50%, transparent 53%),
        linear-gradient(-45deg, transparent 47%, rgba(255,255,255,0.08) 50%, transparent 53%),

        /* secondary fracture lines */
        repeating-linear-gradient(
            0deg,
            rgba(255,255,255,0.06) 0px,
            transparent 3px,
            transparent 6px
        );
    
    mix-blend-mode:screen;
    filter:contrast(2) brightness(1.4);
}

/* ANIMATIONS */
@keyframes screenGlitch{
    0%{opacity:0;}
    10%{opacity:1;}
    25%{opacity:0.2;}
    40%{opacity:1;}
    60%{opacity:0.3;}
    100%{opacity:0;}
}

@keyframes screenBreak{
    0%{
        opacity:0;
        transform:scale(1);
    }
    10%{
        opacity:1;
        transform:scale(1.01);
    }
    25%{
        opacity:0.9;
        transform:translateX(2px);
    }
    50%{
        opacity:1;
        transform:translateX(-2px);
    }
    75%{
        opacity:0.85;
        transform:translateX(1px);
    }
    100%{
        opacity:0.9; /* IMPORTANT: hold visibility */
        transform:scale(1);
    }
}

@keyframes microFlicker{
    0%{opacity:0.9;}
    50%{opacity:0.6;}
    100%{opacity:0.95;}
}

@keyframes pixelShift {
    0%   { transform: translate(0px,0px); }
    20%  { transform: translate(2px,-1px); }
    40%  { transform: translate(-3px,2px); }
    60%  { transform: translate(1px,1px); }
    80%  { transform: translate(-2px,-2px); }
    100% { transform: translate(0px,0px); }
}

/* SHAKE EFFECT */
.shake{
    animation:shake 0.1s infinite;
}

@keyframes shake{
    0%{transform:translate(0);}
    50%{transform:translate(2px,1px);}
    100%{transform:translate(-2px,-1px);}
}

</style>
</head>

<body>

<!-- OVERLAYS -->
<div id="glitchOverlay"></div>
<div id="brokenScreen"></div>

<div id="start" class="screen">
    <button onclick="begin()">Start Challenge</button>
</div>

<div id="load" class="screen">
    <h1>Running Diagnostics...</h1>
    <div class="bar"><div class="fill"></div></div>
</div>

<div id="panic" class="screen">
    <h1>⚠ SYSTEM DIAGNOSTICS ⚠</h1>
    <p>BIOS: hardware enumeration complete</p>
    <p>Kernel: input subsystem initialized</p>
    <p>GPU: rendering pipeline instability detected</p>
    <p>Display driver: frame sync mismatch</p>
    <p>Recovery module: attempting reconstruction...</p>
</div>

<div id="reveal" class="screen">
    😂 You got pranked 😂
</div>

<div id="final" class="screen">
    <img src="face.jpg">
    <div id="finalText"></div>
</div>

<script>

/* SCREEN SWITCH */
function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
    document.getElementById(id).style.display='flex';
}

/* GLITCH EFFECT */
function screenGlitch(){
    let g=document.getElementById("glitchOverlay");
    g.style.animation="screenGlitch 0.6s linear 2";
}

/* SCREEN BREAK EFFECT */
function screenBreak(){
    let b=document.getElementById("brokenScreen");
    b.classList.add("broken-active");
}

function hardContrastEvent(){
    let flash=document.createElement("div");

    flash.style.position="fixed";
    flash.style.top="0";
    flash.style.left="0";
    flash.style.width="100vw";
    flash.style.height="100vh";
    flash.style.background="white";
    flash.style.zIndex="9999";
    flash.style.pointerEvents="none";
    flash.style.opacity="1";

    document.body.appendChild(flash);

    setTimeout(()=>{
        flash.style.transition="opacity 0.2s";
        flash.style.opacity="0";
    },80);

    setTimeout(()=>{
        flash.remove();
    },300);
}

/* MAIN FLOW */
function begin(){

    document.documentElement.requestFullscreen();
    document.body.style.cursor="none";

    show("load");

    setTimeout(()=>{
    	hardContrastEvent(); 
        screenGlitch();
        screenBreak();
        show("panic");
        
        let panic=document.getElementById("panic");
    	document.getElementById("panic").style.animation="pixelShift 0.2s infinite";
        document.body.classList.add("shake");
    },3000);

    setTimeout(()=>{
        show("reveal");
    },9000);

    setTimeout(()=>{
        show("final");

        let params = new URLSearchParams(window.location.search);
        let name = params.get("name") || "friend";

        document.getElementById("finalText").innerText =
        "I know what you downloaded, " + name + ".";
            // instant image pop-in (no animation)
    setTimeout(()=>{
        document.querySelector("#final img").style.opacity = "1";
    }, 50);

    },11000);
}

show("start");

</script>

</body>
</html>
